name: Android CI screen

on:
  workflow_dispatch:
  # push:
  #   branches: [ main, master ]
  #   paths:
  #     - 'remote/**'  # Diperbaiki dari remotetv1

defaults:
  run:
    working-directory: ./android

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
          # WAJIB DITAMBAHKAN agar cache bekerja untuk project di dalam folder 'remote'
          cache-dependency-path: 'android/**/*.gradle*' 

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build and Test (Optimized)
        # Menambahkan prefix :app: agar build lebih terarah pada modul aplikasi utama
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ] || [ "${{ github.ref }}" = "refs/heads/master" ]; then
            ./gradlew :app:testDebugUnitTest :app:assembleDebug :app:assembleRelease --no-daemon --parallel --build-cache --configure-on-demand
          else
            ./gradlew :app:testDebugUnitTest :app:assembleDebug --no-daemon --parallel --build-cache --configure-on-demand
          fi
        shell: bash

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          # Path diperbaiki dengan awalan remote/
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload release APK artifact
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          # Path diperbaiki dengan awalan remote/
          path: android/app/build/outputs/apk/release/
          
